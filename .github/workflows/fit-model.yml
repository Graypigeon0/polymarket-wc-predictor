name: Fit Model

# Run robust Dixon-Coles fitting on historical match data.
# Manual trigger only — typically run after a backfill or weekly refresh.
# Robust IRLS does ~5 iterations so this is slower than vanilla MLE.
on:
  workflow_dispatch: {}

jobs:
  fit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Fit + predict
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m backend.main fit
          python -m backend.main predict
